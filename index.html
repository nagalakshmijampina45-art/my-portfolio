<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Report Card</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- External CSS -->
    <link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container my-4">

    <!-- Header -->
    <h1 class="text-center bg-primary text-white p-3 rounded">
        Student Report Card
    </h1>

    <!-- Student Form -->
    <div class="card shadow p-4 mt-4">

        <h3 class="mb-3">Student Details</h3>

        <form id="studentForm">

            <!-- Student Name -->
            <div class="mb-3">
                <label class="form-label">Student Name</label>
                <input type="text" id="studentName" class="form-control">
                <small id="nameError" class="error"></small>
            </div>

            <!-- Class -->
            <div class="mb-3">
                <label class="form-label">Class</label>
                <select id="className" class="form-select">
                    <option value="">Select Class</option>
                    <option>Class 6</option>
                    <option>Class 7</option>
                    <option>Class 8</option>
                    <option>Class 9</option>
                    <option>Class 10</option>
                </select>
            </div>

            <!-- Subject Marks -->
            <div class="row">

                <div class="col-md-4 mb-3">
                    <label class="form-label">Mathematics</label>
                    <input type="number" id="maths" class="form-control">
                    <small id="mathError" class="error"></small>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">Science</label>
                    <input type="number" id="science" class="form-control">
                    <small id="scienceError" class="error"></small>
                </div>

                <div class="col-md-4 mb-3">
                    <label class="form-label">English</label>
                    <input type="number" id="english" class="form-control">
                    <small id="englishError" class="error"></small>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">History</label>
                    <input type="number" id="history" class="form-control">
                    <small id="historyError" class="error"></small>
                </div>

                <div class="col-md-6 mb-3">
                    <label class="form-label">Computer Science</label>
                    <input type="number" id="computer" class="form-control">
                    <small id="computerError" class="error"></small>
                </div>

            </div>

            <!-- Buttons -->
            <div class="mt-3">

                <button type="submit" class="btn btn-success">
                    Add Student
                </button>

                <button type="button" id="clearBtn" class="btn btn-warning">
                    Clear Form
                </button>

                <button type="button" id="removeBtn" class="btn btn-danger">
                    Remove Last Student
                </button>

            </div>

        </form>

    </div>

    <!-- Report Table -->
    <div class="card shadow mt-4 p-3">

        <h3 class="mb-3">Report Card</h3>

        <div class="table-responsive">

            <table class="table table-bordered table-hover text-center">

                <thead class="table-dark">
                    <tr>
                        <th>Student Name</th>
                        <th>Class</th>
                        <th>Maths</th>
                        <th>Science</th>
                        <th>English</th>
                        <th>History</th>
                        <th>Computer</th>
                        <th>Total</th>
                        <th>Percentage</th>
                        <th>Grade</th>
                        <th>Result</th>
                    </tr>
                </thead>

                <tbody id="tableBody">

                </tbody>

            </table>

        </div>

    </div>

    <!-- Summary Section -->
    <div class="card shadow mt-4 p-4">

        <h3>Summary Statistics</h3>

        <p id="totalStudents"></p>

        <p id="averagePercentage"></p>

        <p id="highestStudent"></p>

        <p id="lowestStudent"></p>

        <p id="gradeCounts"></p>

    </div>

</div>

<!-- External JavaScript -->
<script src="script.js"></script>

</body>
</html>
