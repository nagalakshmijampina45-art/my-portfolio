<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bootstrap Example</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-dark bg-dark navbar-expand-lg">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">MyBrand</a>

        <div class="navbar-nav ms-auto flex-row gap-3">
            <a class="nav-link active" href="#">Home</a>
            <a class="nav-link" href="#">About</a>
            <a class="nav-link" href="#">Services</a>
            <a class="nav-link" href="#">Contact</a>
        </div>
    </div>
</nav>

<div class="container mt-4">

    <h1 class="text-center mb-4">Welcome to Bootstrap Example</h1>

    <h3>Grid Columns</h3>

    <div class="row text-center mb-4">
        <div class="col bg-light p-3 border">Column 1</div>
        <div class="col bg-secondary text-white p-3 border">Column 2</div>
        <div class="col bg-light p-3 border">Column 3</div>
    </div>

    <h3>Bootstrap Buttons</h3>

    <button class="btn btn-primary">Primary</button>
    <button class="btn btn-secondary">Secondary</button>
    <button class="btn btn-success">Success</button>
    <button class="btn btn-danger">Danger</button>
    <button class="btn btn-warning">Warning</button>

    <hr>

    <h3>Bootstrap Cards</h3>

    <div class="row">

        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">
                    <h5 class="card-title">Card 1</h5>
                    <p class="card-text">Bootstrap Card Example</p>
                    <a href="#" class="btn btn-primary">Read More</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">
                    <h5 class="card-title">Card 2</h5>
                    <p class="card-text">Bootstrap Card Example</p>
                    <a href="#" class="btn btn-success">Read More</a>
                </div>
            </div>
        </div>

        <div class="col-md-4">
            <div class="card shadow">
                <div class="card-body">
                    <h5 class="card-title">Card 3</h5>
                    <p class="card-text">Bootstrap Card Example</p>
                    <a href="#" class="btn btn-danger">Read More</a>
                </div>
            </div>
        </div>

    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
